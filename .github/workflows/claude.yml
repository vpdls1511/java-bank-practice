name: Claude

# PR/이슈 코멘트에서 @claude 를 멘션하면 Claude가 응답한다.
# (추가 코드리뷰 요청, 질문, 수정 요청 등)
#
# [보안 노트]
# - 코멘트 이벤트는 fork 코드가 아닌 base 레포 컨텍스트에서 실행되지만,
#   아무나 @claude 멘션으로 실행시키지 못하도록 author_association 을
#   OWNER / MEMBER / COLLABORATOR 로 제한한다.
# - claude-code-action 자체도 트리거한 사용자의 write 권한을 한 번 더 검증한다.
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened]

jobs:
  claude:
    # @claude 멘션이 있고, 작성자가 레포에 write 권한이 있는 경우에만 실행
    if: |
      (github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@claude') &&
        contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@claude') &&
        contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review' &&
        contains(github.event.review.body, '@claude') &&
        contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.review.author_association)) ||
      (github.event_name == 'issues' &&
        (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')) &&
        contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.issue.author_association))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write   # Claude GitHub App 토큰 교환(OIDC)에 필요
      actions: read     # CI 결과 확인용
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude
        uses: anthropics/claude-code-action@v1
        with:
          # Claude Code Max 구독의 OAuth 토큰 (`claude setup-token` 으로 생성)
          claude_code_oauth_token: ${{ secrets.ANTHROPIC_API_KEY }}
          # prompt 를 비워두면 @claude 멘션 내용에 자동으로 응답한다.
          # 모델 지정: Opus 사용 (Max 구독에 Opus 접근 포함)
          claude_args: "--model claude-opus-4-8"
